name: Offboard Customer

on:
  workflow_dispatch:
    inputs:
      customer:
        description: 'Customer folder name to offboard'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  offboard:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.customer }}   # required reviewers here are your last safety gate
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC - MSSP management identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: Verify tenant scope before touching anything
        run: |
          chmod +x scripts/*.sh
          bash scripts/verify-tenant-scope.sh "customers/${{ github.event.inputs.customer }}/config.json" "${{ secrets.AZURE_TENANT_ID }}"

      - name: Remove deployed content
        run: |
          CFG="customers/${{ github.event.inputs.customer }}/config.json"
          SUB=$(jq -r .subscriptionId "$CFG")
          az account set --subscription "$SUB"
          bash scripts/offboard-customer.sh "${{ github.event.inputs.customer }}" --yes

      - name: Print manual follow-up checklist
        run: |
          echo "::notice::Content removed for ${{ github.event.inputs.customer }}. Manually: (1) have customer revoke Lighthouse delegation, (2) delete the GitHub Environment for this customer, (3) confirm billing/contract closure."
